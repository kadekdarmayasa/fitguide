<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="50" cy="18" rx="10" ry="10" fill="#3a3530"/>
  <!-- Torso -->
  <rect x="36" y="28" width="28" height="28" rx="4" fill="#3a3530"/>
  <!-- Legs -->
  <rect x="36" y="56" width="11" height="30" rx="4" fill="#3a3530"/>
  <rect x="53" y="56" width="11" height="30" rx="4" fill="#3a3530"/>
  <!-- Arms raised up holding bar -->
  <line x1="36" y1="34" x2="18" y2="14" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="34" x2="82" y2="14" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <!-- Barbell -->
  <rect x="10" y="10" width="6" height="10" rx="2" fill="#e8a020"/>
  <rect x="84" y="10" width="6" height="10" rx="2" fill="#e8a020"/>
  <rect x="15" y="13" width="70" height="4" rx="2" fill="#e8a020"/>
  <!-- Upward arrows -->
  <line x1="50" y1="6" x2="50" y2="1" stroke="#e8a020" stroke-width="2" stroke-linecap="round"/>
  <polyline points="47,4 50,1 53,4" fill="none" stroke="#e8a020" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
