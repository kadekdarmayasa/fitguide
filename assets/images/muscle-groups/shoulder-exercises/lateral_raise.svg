<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="50" cy="16" rx="10" ry="10" fill="#3a3530"/>
  <!-- Torso -->
  <rect x="34" y="26" width="32" height="34" rx="4" fill="#3a3530"/>
  <!-- Legs -->
  <rect x="34" y="60" width="13" height="36" rx="4" fill="#3a3530"/>
  <rect x="53" y="60" width="13" height="36" rx="4" fill="#3a3530"/>
  <!-- Left arm raised sideways (isolation position) -->
  <line x1="34" y1="34" x2="8" y2="42" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm raised sideways -->
  <line x1="66" y1="34" x2="92" y2="42" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <!-- Left medial deltoid highlight -->
  <ellipse cx="24" cy="36" rx="12" ry="8" fill="#e8a020" transform="rotate(-15 24 36)"/>
  <!-- Right medial deltoid highlight -->
  <ellipse cx="76" cy="36" rx="12" ry="8" fill="#e8a020" transform="rotate(15 76 36)"/>
  <!-- Dumbbell left -->
  <rect x="3" y="40" width="3" height="7" rx="1.5" fill="#c8841a"/>
  <rect x="5" y="42" width="8" height="3" rx="1.5" fill="#c8841a"/>
  <rect x="12" y="40" width="3" height="7" rx="1.5" fill="#c8841a"/>
  <!-- Dumbbell right -->
  <rect x="94" y="40" width="3" height="7" rx="1.5" fill="#c8841a"/>
  <rect x="87" y="42" width="8" height="3" rx="1.5" fill="#c8841a"/>
  <rect x="85" y="40" width="3" height="7" rx="1.5" fill="#c8841a"/>
</svg>
