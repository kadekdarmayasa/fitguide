<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="50" cy="16" rx="10" ry="10" fill="#3a3530"/>
  <!-- Torso -->
  <rect x="34" y="26" width="32" height="34" rx="4" fill="#3a3530"/>
  <!-- Legs -->
  <rect x="34" y="60" width="13" height="36" rx="4" fill="#3a3530"/>
  <rect x="53" y="60" width="13" height="36" rx="4" fill="#3a3530"/>
  <!-- Left arm - elbow up, forearm up (arnold press mid position) -->
  <line x1="34" y1="32" x2="16" y2="36" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <line x1="16" y1="36" x2="18" y2="16" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="66" y1="32" x2="84" y2="36" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <line x1="84" y1="36" x2="82" y2="16" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
  <!-- Full deltoid highlight left (all 3 heads) -->
  <ellipse cx="22" cy="34" rx="12" ry="9" fill="#e8a020" transform="rotate(-10 22 34)"/>
  <!-- Full deltoid highlight right -->
  <ellipse cx="78" cy="34" rx="12" ry="9" fill="#e8a020" transform="rotate(10 78 34)"/>
  <!-- Rotation arc arrows showing arnold rotation -->
  <path d="M20 16 Q14 22 18 28" fill="none" stroke="#e8a020" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="16,26 18,28 20,25" fill="none" stroke="#e8a020" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80 16 Q86 22 82 28" fill="none" stroke="#e8a020" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="84,26 82,28 80,25" fill="none" stroke="#e8a020" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dumbbell left -->
  <rect x="12" y="11" width="3" height="6" rx="1.5" fill="#c8841a"/>
  <rect x="14" y="12.5" width="7" height="3" rx="1.5" fill="#c8841a"/>
  <rect x="20" y="11" width="3" height="6" rx="1.5" fill="#c8841a"/>
  <!-- Dumbbell right -->
  <rect x="85" y="11" width="3" height="6" rx="1.5" fill="#c8841a"/>
  <rect x="79" y="12.5" width="7" height="3" rx="1.5" fill="#c8841a"/>
  <rect x="77" y="11" width="3" height="6" rx="1.5" fill="#c8841a"/>
</svg>
